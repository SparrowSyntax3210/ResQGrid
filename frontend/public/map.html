<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      #map {
        height: 100vh;
        width: 100%;
      }

      .grid-label {
        background: transparent;
        border: none;
        box-shadow: none;
        font-weight: bold;
        font-size: 16px;
        color: black;
      }
      #chatToggle{

    position:absolute;

    bottom:30px;

    right:30px;

    z-index:1000;

    padding:14px 24px;

    border:none;

    border-radius:14px;

    background:#7C3AED;

    color:white;

    font-size:16px;

    cursor:pointer;

    box-shadow:0 8px 30px rgba(0,0,0,.3);

}

#chatOverlay{

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    width:600px;

    height:600px;

    background:white;

    border-radius:18px;

    overflow:hidden;

    display:none;

    z-index:9999;

    box-shadow:0 20px 60px rgba(0,0,0,.45);

}

.chat-header{

    height:55px;

    background:#7C3AED;

    color:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 18px;

}

.chat-header button{

    border:none;

    background:none;

    color:white;

    font-size:22px;

    cursor:pointer;

}

#chatFrame{

    width:100%;

    height:545px;

}
    </style>
  </head>

  <body>
    <div id="map"></div>
    <button id="chatToggle">
    💬 Chat
</button>

<div id="chatOverlay">

    <div class="chat-header">

        <button id="closeChat">✕</button>
    </div>

    <iframe
        id="chatFrame"
        src=""
        frameborder="0">
    </iframe>

</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const params = new URLSearchParams(window.location.search);

      const caseId = params.get("id");
      const lastSeenLocation = params.get("location");
      const API = "http://localhost:5000";

      const socket = io(API, {
        withCredentials: true,
      });

      const gridRectangles = {};

      const map = L.map("map").setView([20.5937, 78.9629], 5);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      // ======================================
      // SOCKET CONNECTION
      // ======================================

      socket.on("connect", () => {
        console.log("Socket Connected:", socket.id);

        console.log("Joining Case:", caseId);

        socket.emit("join_case", caseId);
      });
      setInterval(() => {

    socket.emit("heartbeat", {

        caseId

    });

}, 20000);

      // ======================================
      // RECEIVE LIVE GRID DATA
      // ======================================
socket.on("case_state",(state)=>{

    if(!state.grids) return;

    for(const grid in state.grids){

        const data=state.grids[grid];

        const rectangle=gridRectangles[grid];

        if(!rectangle) continue;

        let color="#22c55e";
        let level="Low";

        if(data.priority>=80){

            color="#ef4444";
            level="Critical";

        }
        else if(data.priority>=50){

            color="#f59e0b";
            level="Medium";

        }

        rectangle.setStyle({

            color,
            fillColor:color,
            fillOpacity:.25

        });

        rectangle.setTooltipContent(
            `
            <div>
                <b>${grid}</b><br>
                Priority: ${data.priority}/100<br>
                Status: ${level}<br>
                Searched: ${data.searched}%<br>
                Volunteers: ${data.count}
            </div>
            `
        );

    }

});

      // ======================================
      // LOAD LOCATION
      // ======================================

      async function showLocation() {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(lastSeenLocation)}`,
          );

          const data = await res.json();

          if (data.length === 0) {
            alert("Location not found");

            return;
          }

          const lat = parseFloat(data[0].lat);

          const lon = parseFloat(data[0].lon);

          console.log("Coordinates:", lat, lon);

          map.setView([lat, lon], 16);

          L.circle([lat, lon], {
            radius: 1000,
          }).addTo(map);

          createGrid(lat, lon);
        } catch (err) {
          console.log("Map Error:", err);
        }
      }

      // ======================================
      // CREATE GRID
      // ======================================
function createGrid(lat, lon) {

    const latStep = 0.003;
    const lonStep = 0.003;

    const rows = ["A","B","C"];

    for(let i=0;i<3;i++){

        for(let j=0;j<3;j++){

            const southWest=[
                lat+(i-1)*latStep,
                lon+(j-1)*lonStep
            ];

            const northEast=[
                lat+i*latStep,
                lon+j*lonStep
            ];

            const gridName=`${rows[i]}${j+1}`;

            const rectangle=L.rectangle(
                [southWest,northEast],
                {
                    color:"#22c55e",
                    fillColor:"#22c55e",
                    fillOpacity:.25,
                    weight:2
                }
            ).addTo(map);

            gridRectangles[gridName]=rectangle;

            rectangle.bindTooltip(
                `
                <div>
                    <b>${gridName}</b><br>
                    Priority: 0/100<br>
                    Searched: 0%<br>
                    Volunteers: 0
                </div>
                `,
                {
                    permanent:true,
                    direction:"center",
                    className:"grid-label"
                }
            );

            rectangle.on("click",()=>{

                socket.emit("claim_grid",{
                    caseId,
                    gridId:gridName
                });

            });

            rectangle.on("contextmenu",()=>{

                socket.emit("search_grid",{
                    caseId,
                    gridId:gridName
                });

            });

        }

    }

}

      showLocation();
      const overlay = document.getElementById("chatOverlay");

const frame = document.getElementById("chatFrame");

document
.getElementById("chatToggle")
.onclick = ()=>{

    frame.src = `/chat-volunteer.html?id=${caseId}`;

    overlay.style.display = "block";

};

document
.getElementById("closeChat")
.onclick = ()=>{

    overlay.style.display = "none";

    frame.src="";

};
    </script>
  </body>
</html>
