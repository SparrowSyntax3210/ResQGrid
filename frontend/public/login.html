<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResQGrid | Login</title>
    <style>
      :root {
        --bg: #0a0a12;
        --card-bg: #12131c;
        --panel-bg: #0d0e17;
        --border: #232432;
        --input-bg: #191a25;
        --input-border: #2a2b3a;
        --text-primary: #f5f5f7;
        --text-secondary: #8b8d9c;
        --text-muted: #6b6d7d;
        --purple: #6e56ef;
        --purple-light: #8b74f7;
        --orange: #f7931e;
        --orange-light: #ffb347;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        font-family:
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-card {
        width: 100%;
        max-width: 1000px;
        height: 100%;
        max-height: 640px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 24px;
        display: flex;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      /* ---------- LEFT PANEL ---------- */
      .form-panel {
        flex: 1 1 50%;
        padding: 40px 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
      }

      .logo-wrap img {
        height: 48px;
        width: auto;
        display: block;
      }

      .tagline {
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 28px;
        letter-spacing: 0.2px;
      }

      .welcome-title {
        color: var(--text-primary);
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .welcome-sub {
        color: var(--text-secondary);
        font-size: 13.5px;
        margin-bottom: 24px;
      }

      .field-group {
        margin-bottom: 16px;
      }

      .field-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12.5px;
        color: var(--text-primary);
        margin-bottom: 7px;
        font-weight: 500;
      }

      .forgot-link {
        color: var(--purple-light);
        font-size: 12.5px;
        text-decoration: none;
        font-weight: 500;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrap svg {
        position: absolute;
        left: 14px;
        width: 16px;
        height: 16px;
        color: var(--text-muted);
        pointer-events: none;
      }

      .input-wrap input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 10px;
        padding: 12px 14px 12px 40px;
        color: var(--text-primary);
        font-size: 13.5px;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .input-wrap input::placeholder {
        color: var(--text-muted);
      }

      .input-wrap input:focus {
        border-color: var(--purple);
        box-shadow: 0 0 0 3px rgba(110, 86, 239, 0.15);
      }

      .toggle-eye {
        position: absolute;
        right: 14px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        padding: 0;
      }

      .toggle-eye svg {
        position: static;
        width: 16px;
        height: 16px;
      }

      .remember-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0 22px;
      }

      .remember-row input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1px solid var(--input-border);
        background: var(--purple);
        position: relative;
        cursor: pointer;
        flex-shrink: 0;
      }

      .remember-row input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 4px;
        height: 9px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .remember-row label {
        font-size: 13px;
        color: var(--text-secondary);
        cursor: pointer;
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #7c5cff 0%, #5a3fe0 100%);
        color: #fff;
        font-size: 14.5px;
        font-weight: 600;
        cursor: pointer;
        transition:
          filter 0.15s ease,
          transform 0.15s ease;
      }

      .btn-login:hover {
        filter: brightness(1.08);
      }

      .btn-login:active {
        transform: scale(0.99);
      }

      .register-text {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .register-text a {
        color: var(--purple-light);
        text-decoration: none;
        font-weight: 600;
      }

      .register-text a:hover {
        text-decoration: underline;
      }

      /* ---------- RIGHT PANEL ---------- */
      .visual-panel {
        flex: 1 1 50%;
        background: var(--panel-bg);
        position: relative;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
        min-width: 0;
      }

      .visual-inner {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
      }

      .visual-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      .safety-card {
        position: absolute;
        bottom: 14px;
        left: 12px;
        right: 12px;
        background: rgba(18, 19, 28, 0.92);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        backdrop-filter: blur(6px);
      }

      .safety-icon {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(135deg, #7c5cff, #5a3fe0);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .safety-icon svg {
        width: 17px;
        height: 17px;
      }

      .safety-text-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 2px;
      }

      .safety-text-body {
        font-size: 11.5px;
        color: var(--text-secondary);
        line-height: 1.4;
      }

      /* ---------- RESPONSIVE ---------- */
      @media (max-width: 820px) {
        html,
        body {
          overflow: auto;
        }
        .auth-card {
          flex-direction: column;
          max-height: none;
          height: auto;
        }
        .visual-panel {
          order: -1;
          min-height: 220px;
          padding: 20px;
        }
        .form-panel {
          padding: 32px 28px;
        }
      }

      /* ===========================
   Glass Background Glow
=========================== */

      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
        z-index: -1;
        opacity: 0.24;
      }

      body::before {
        background: #3b82f6;
        top: -150px;
        left: -120px;
      }

      body::after {
        background: #6e56ef;
        bottom: -170px;
        right: -120px;
      }

      /* Glass Card */

      .auth-card {
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      /* Inputs */

      .input-wrap input {
        transition:
          border-color 0.25s,
          box-shadow 0.25s,
          transform 0.25s,
          background 0.25s;
      }

      .input-wrap:hover input {
        background: #202233;
      }

      .input-wrap input:focus {
        transform: translateY(-2px);
      }

      /* Login Button */

      .btn-login {
        transition:
          transform 0.3s,
          box-shadow 0.3s,
          filter 0.3s;
      }

      .btn-login:hover {
        transform: translateY(-3px);

        box-shadow:
          0 14px 32px rgba(110, 86, 239, 0.35),
          0 0 18px rgba(110, 86, 239, 0.25);
      }

      /* Safety Card */

      .safety-card {
        transition: 0.35s;
      }

      .safety-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }

      /* Right Image */

      .visual-inner img {
        transition: transform 1s ease;
      }

      .visual-panel:hover img {
        transform: scale(1.04);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <!-- LEFT: FORM -->
      <div class="form-panel">
        <div class="logo-wrap">
          <img src="./assets/logo.png" alt="ResQGrid" />
        </div>
        <p class="tagline">Find. Connect. Reunite.</p>

        <h1 class="welcome-title">Welcome back!</h1>
        <p class="welcome-sub">Login to continue your mission.</p>

        <form action="/auth/login" method="POST">
          <div class="field-group">
            <div class="field-label">
              <span>Email or Phone</span>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 4h16v16H4z" opacity="0" />
                <path d="M22 6l-10 7L2 6" />
                <path d="M2 6h20v12H2z" />
              </svg>
              <input
                type="text"
                name="Email"
                placeholder="Enter email or phone"
                required
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field-group">
            <div class="field-label">
              <span>Password</span>
              <a href="/auth/forgot-password" class="forgot-link">Forgot?</a>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="11" width="14" height="9" rx="2" />
                <path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
              <input
                type="password"
                id="password"
                name="Password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="toggle-eye"
                id="togglePassword"
                aria-label="Show password"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  id="eyeIcon"
                >
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" checked />
            <label for="remember">Remember me</label>
          </div>

          <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="register-text">
          Don't have an account? <a href="register.html">Register</a>
        </p>
      </div>

      <!-- RIGHT: VISUAL -->
      <div class="visual-panel">
        <div class="visual-inner">
          <img
            src="../assets/map-illustration.png"
            alt="Rescue location map illustration"
          />
          <div class="safety-card">
            <div class="safety-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2 4 5v6c0 5 3.4 9 8 11 4.6-2 8-6 8-11V5z" />
                <path d="M9 12l2 2 4-4" stroke="#f7931e" />
              </svg>
            </div>
            <div>
              <div class="safety-text-title">Your data is safe with us.</div>
              <div class="safety-text-body">
                We protect your privacy and ensure secure connections.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

    <script>
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");

      togglePassword.addEventListener("click", function () {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";

        eyeIcon.innerHTML = isHidden
          ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a21.7 21.7 0 0 1-3.16 4.53M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';

        togglePassword.setAttribute(
          "aria-label",
          isHidden ? "Hide password" : "Show password",
        );
      });

      // ============================
      // GSAP Intro Animation
      // ============================

      window.addEventListener("load", () => {
        const tl = gsap.timeline({
          defaults: {
            ease: "power3.out",
          },
        });

        tl.from(".auth-card", {
          opacity: 0,
          y: 35,
          duration: 0.8,
        });

        tl.from(
          [".logo-wrap", ".tagline", ".welcome-title", ".welcome-sub"],
          {
            opacity: 0,
            y: 18,
            stagger: 0.08,
            duration: 0.45,
          },
          "-=0.45",
        );

        tl.from(
          ".field-group",
          {
            opacity: 0,
            y: 18,
            stagger: 0.08,
            duration: 0.4,
          },
          "-=0.3",
        );

        tl.from(
          ".remember-row",
          {
            opacity: 0,
            y: 15,
            duration: 0.35,
          },
          "-=0.1",
        );

        tl.from(
          ".btn-login",
          {
            opacity: 0,
            scale: 0.94,
            duration: 0.45,
          },
          "-=0.15",
        );

        tl.from(".register-text", {
          opacity: 0,
          y: 12,
          duration: 0.35,
        });

        tl.from(
          ".visual-panel",
          {
            opacity: 0,
            x: 40,
            duration: 0.8,
          },
          "-=1",
        );

        tl.from(
          ".safety-card",
          {
            opacity: 0,
            y: 30,
            duration: 0.5,
          },
          "-=0.3",
        );
      });

      // ============================
      // Floating Illustration
      // ============================

      gsap.to(".visual-inner img", {
        y: -10,
        duration: 4,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
      });

      // ============================
      // Floating Safety Card
      // ============================

      gsap.to(".safety-card", {
        y: -5,
        duration: 2.8,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
      });

      // ============================
      // Inputs Hover
      // ============================

      document.querySelectorAll(".input-wrap input").forEach((input) => {
        input.addEventListener("mouseenter", () => {
          gsap.to(input, {
            y: -2,
            duration: 0.2,
          });
        });

        input.addEventListener("mouseleave", () => {
          if (document.activeElement !== input) {
            gsap.to(input, {
              y: 0,
              duration: 0.2,
            });
          }
        });
      });

      // ============================
      // Button Hover
      // ============================

      const loginBtn = document.querySelector(".btn-login");

      loginBtn.addEventListener("mouseenter", () => {
        gsap.to(loginBtn, {
          scale: 1.02,
          duration: 0.2,
        });
      });

      loginBtn.addEventListener("mouseleave", () => {
        gsap.to(loginBtn, {
          scale: 1,
          duration: 0.2,
        });
      });
    </script>
  </body>
</html>
