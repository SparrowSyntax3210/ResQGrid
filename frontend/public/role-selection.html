<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Role</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Resets & Theme Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #06080c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        /* Container Card */
        .role-container {
            background-color: #0d111a;
            border: 1px solid #161f30;
            border-radius: 24px;
            padding: 45px 35px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Header Styles */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 14px;
            color: #6e7f94;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Grid wrapper for the Two Buttons */
        .role-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 40px;
        }

        /* Clickable Card Styles */
        .role-card {
            background: transparent;
            border-radius: 20px;
            padding: 35px 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            outline: none;
        }

        /* Guardian Card Styling */
        .role-card.guardian {
            border: 1px solid rgba(118, 75, 238, 0.15);
            background: linear-gradient(180deg, rgba(118, 75, 238, 0.02) 0%, rgba(118, 75, 238, 0.04) 100%);
        }

        .role-card.guardian:hover {
            border-color: #764bee;
            background: rgba(118, 75, 238, 0.08);
            transform: translateY(-2px);
        }

        /* Volunteer Card Styling */
        .role-card.volunteer {
            border: 1px solid rgba(253, 114, 15, 0.15);
            background: linear-gradient(180deg, rgba(253, 114, 15, 0.02) 0%, rgba(253, 114, 15, 0.04) 100%);
        }

        .role-card.volunteer:hover {
            border-color: #fd720f;
            background: rgba(253, 114, 15, 0.08);
            transform: translateY(-2px);
        }

        .role-card:active {
            transform: translateY(1px);
        }

        /* Icon Wrapper Layout */
        .icon-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 56px;
            width: 100%;
        }

        .guardian .icon-container svg {
            fill: #764bee;
        }

        .volunteer .icon-container svg {
            fill: #fd720f;
        }

        /* Text Styles */
        .role-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .role-description {
            font-size: 12px;
            color: #5d6d82;
            line-height: 1.6;
            padding: 0 5px;
        }

        /* Footer Element */
        .footer-text {
            font-size: 14px;
            color: #5d6d82;
        }

        .login-link {
            color: #764bee;
            text-decoration: none;
            font-weight: 500;
            margin-left: 5px;
            transition: color 0.2s ease;
        }

        .login-link:hover {
            color: #926eff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="role-container">
        <h1>Choose Your Role</h1>
        <p class="subtitle">Join as a Guardian or Volunteer<br>to make a difference.</p>

        <div class="role-options">
            <button type="button" class="role-card guardian" id="BtnGuardian" data-role="Guardian">
                <div class="icon-container">
                    <svg width="60" height="52" viewBox="0 0 64 56">
                        <circle cx="17" cy="19" r="4.5"/>
                        <path d="M17 26.5c-3.5 0-7.5 1.8-8.5 4.5-.5 1.3-.5 2.5-.5 3.5h11v-3.5c0-1.8 1.2-3.4 2.8-4.1-.7-.2-1.4-.4-1.8-.4z" opacity="0.65"/>
                        <circle cx="47" cy="19" r="4.5"/>
                        <path d="M47 26.5c.4 0 1.1.2 1.8.4 1.6.7 2.8 2.3 2.8 4.1v3.5h11c0-1-.1-2.2-.5-3.5-1-2.7-5-4.5-8.5-4.5z" opacity="0.65"/>
                        <circle cx="32" cy="15" r="7"/>
                        <path d="M32 25c-6.5 0-13 3.5-14 8.5-.6 3 1 5.5 4.5 5.5h19c3.5 0 5.1-2.5 4.5-5.5-1-5-7.5-8.5-14-8.5z"/>
                    </svg>
                </div>
            
                <div class="role-title">Guardian</div>
                <div class="role-description">
                    Report missing loved ones and track progress.
                </div>
            </button>
            
            <button type="button" class="role-card volunteer" id="BtnVolunteer" data-role="Volunteer">
                <div class="icon-container">
                    <svg width="60" height="52" viewBox="0 0 64 56">
                        <path d="M26,11 L28.5,14.5 L32,11.5 L35.5,14.5 L38,11 L39.5,16 L24.5,16 Z"/>
                        <circle cx="32" cy="20.5" r="4.5"/>
                        <path d="M24,28 C24,26.3 25.3,25 27,25 L37,25 C38.7,25 40,26.3 40,28 L40,41 C40,41.6 39.6,42 39,42 L36.5,42 L36.5,50 C36.5,50.6 36.1,51 35.5,51 L33.5,51 C32.9,51 32.5,50.6 32.5,50 L32.5,42 L31.5,42 L31.5,50 C31.5,50.6 31.1,51 30.5,51 L28.5,51 C27.9,51 27.5,50.6 27.5,50 L27.5,42 L25,42 C24.4,42 24,41.6 24,41 Z"/>
                    </svg>
                </div>
            
                <div class="role-title">Volunteer</div>
                <div class="role-description">
                    Search, help and bring hope to families.
                </div>
            </button>
        </div>

        <div class="footer-text">
            Already have an account? <a href="login.html" class="login-link" id="linkLogin">Login</a>
        </div>
    </div>
    <script>
        const API = "http://100.94.168.26:5000";
    document.addEventListener("DOMContentLoaded", () => {
        const guardianBtn = document.getElementById("BtnGuardian");
        const volunteerBtn = document.getElementById("BtnVolunteer");
    
        guardianBtn.addEventListener("click", () => {
            localStorage.setItem("role" , guardianBtn.dataset.role);
            console.log("Guardian selected");
            window.location.href="register.html"
        });
    
        volunteerBtn.addEventListener("click", () => {
            localStorage.setItem("role" , volunteerBtn.dataset.role);
            console.log("Volunteer selected");
            window.location.href="register.html"
        });

        
    });
    </script>
</body>
</html>
