<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian Dashboard</title>

<style>
body{
    font-family:Arial, Helvetica, sans-serif;
    margin:30px;
}

.application{
    border:1px solid #ccc;
    padding:15px;
    margin:20px 0;
    border-radius:10px;
}

.status-box{
    margin-top:15px;
    border:1px solid #ddd;
    background:#f5f5f5;
    padding:10px;
}
</style>

</head>
<body>

<h1>Guardian Dashboard</h1>

<button id="Create-application">Create Application</button>
<button id="my-applications">My Applications</button>

<hr>

<div id="my-application-container"></div>

<script src="http://localhost:5000/socket.io/socket.io.js"></script>

<script>

const container = document.getElementById("my-application-container");

let currentCase = null;
let currentStatusBox = null;

// ---------------- Socket ----------------

if(typeof io==="undefined"){
    alert("Socket.IO failed to load.");
}

const socket = io("http://localhost:5000",{
    withCredentials:true
});

socket.on("connect",()=>{
    console.log("Guardian Connected:",socket.id);
});

socket.on("disconnect",()=>{
    console.log("Disconnected");
});

// ---------------- Create Application ----------------

document.getElementById("Create-application").onclick=()=>{
    window.location.href="application.html";
};

// ---------------- My Applications ----------------

document.getElementById("my-applications").onclick=async()=>{

    try{

        const res=await fetch(
            "http://localhost:5000/guardian/application",
            {
                credentials:"include"
            }
        );

        const applications=await res.json();

        container.innerHTML="";

        if(applications.length===0){

            container.innerHTML="<h3>No Applications Found</h3>";
            return;

        }

        applications.forEach(app=>{

            container.innerHTML+=`

            <div class="application">

                <h2>${app.Name}</h2>

                <p><b>Age:</b> ${app.Age}</p>

                <p><b>Status:</b> ${app.status}</p>

                <p><b>Last Seen:</b> ${app.LastSeen}</p>

                <button
                    class="track-btn"
                    data-id="${app._id}">
                    Track Status
                </button>

                <div
                    id="status-${app._id}"
                    class="status-box">

                </div>

            </div>

            `;

        });

        document.querySelectorAll(".track-btn").forEach(button=>{

            button.onclick=()=>{

                const caseId=button.dataset.id;

                if(currentCase){

                    socket.emit("leave_case",currentCase);

                }

                currentCase=caseId;

                currentStatusBox=document.getElementById(`status-${caseId}`);

                currentStatusBox.innerHTML="<b>Waiting for live updates...</b>";

                socket.emit("join_case",caseId);

                console.log("Joined Case:",caseId);

            };

        });

    }

    catch(err){

        console.error(err);

    }

};

// ---------------- Live Updates ----------------

socket.on("case_state",(state)=>{

    console.log("Received State",state);

    if(!currentStatusBox) return;

    let html=`
        <h3>Live Status</h3>

        <p>
            <b>Total Volunteers:</b>
            ${state.totalVolunteers}
        </p>
    `;

    if(state.grids){

        html+="<h4>Grid Distribution</h4>";

        for(const grid in state.grids){

            html+=`
            <p>
                ${grid}
                :
                ${state.grids[grid].count}
                volunteer(s)
            </p>
            `;

        }

    }

    currentStatusBox.innerHTML=html;

});

</script>

</body>
</html>
