<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResQGrid | Register</title>
    <style>
      :root {
        --bg: #0a0a12;
        --card-bg: #12131c;
        --panel-bg: #0d0e17;
        --border: #232432;
        --input-bg: #191a25;
        --input-border: #2a2b3a;
        --text-primary: #f5f5f7;
        --text-secondary: #8b8d9c;
        --text-muted: #6b6d7d;
        --purple: #6e56ef;
        --purple-light: #8b74f7;
        --orange: #f7931e;
        --orange-light: #ffb347;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        font-family:
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-card {
        width: 100%;
        max-width: 1000px;
        height: 100%;
        max-height: 640px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 24px;
        display: flex;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      /* ---------- LEFT PANEL ---------- */
      .form-panel {
        flex: 1 1 50%;
        padding: 32px 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
      }

      .logo-wrap img {
        height: 44px;
        width: auto;
        display: block;
        position: relative;
        top: 40px;
      }

      .tagline {
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 20px;
        letter-spacing: 0.2px;
        position: relative;
        top: 34px;
      }

      .welcome-title {
        color: var(--text-primary);
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 5px;
        position: relative;
        top: 20px;
      }

      .welcome-sub {
        color: var(--text-secondary);
        font-size: 13.5px;
        margin-bottom: 18px;
        position: relative;
        top: 14px;
      }

      .field-group {
        margin-bottom: 12px;
      }

      .field-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12.5px;
        color: var(--text-primary);
        margin-bottom: 6px;
        font-weight: 500;
      }

      .forgot-link {
        color: var(--purple-light);
        font-size: 12.5px;
        text-decoration: none;
        font-weight: 500;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrap svg {
        position: absolute;
        left: 14px;
        width: 16px;
        height: 16px;
        color: var(--text-muted);
        pointer-events: none;
      }

      .input-wrap input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 10px;
        padding: 11px 14px 11px 40px;
        color: var(--text-primary);
        font-size: 13.5px;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .input-wrap input::placeholder {
        color: var(--text-muted);
      }

      .input-wrap input:focus {
        border-color: var(--purple);
        box-shadow: 0 0 0 3px rgba(110, 86, 239, 0.15);
      }

      .toggle-eye {
        position: absolute;
        right: 14px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        padding: 0;
      }

      .toggle-eye svg {
        position: static;
        width: 16px;
        height: 16px;
      }

      .remember-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0 16px;
      }

      .remember-row input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        position: relative;
        cursor: pointer;
        flex-shrink: 0;
      }

      .remember-row input[type="checkbox"]:checked {
        background: var(--purple);
      }

      .remember-row input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 4px;
        height: 9px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .remember-row label {
        font-size: 12.5px;
        color: var(--text-secondary);
        cursor: pointer;
        line-height: 1.4;
      }

      .remember-row label a {
        color: var(--purple-light);
        text-decoration: none;
        font-weight: 500;
      }

      .remember-row label a:hover {
        text-decoration: underline;
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #7c5cff 0%, #5a3fe0 100%);
        color: #fff;
        font-size: 14.5px;
        font-weight: 600;
        cursor: pointer;
        transition:
          filter 0.15s ease,
          transform 0.15s ease;
        position: relative;
        top: -6px;
      }

      .btn-login:hover {
        filter: brightness(1.08);
      }

      .btn-login:active {
        transform: scale(0.99);
      }

      .register-text {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .register-text a {
        color: var(--purple-light);
        text-decoration: none;
        font-weight: 600;
      }

      .register-text a:hover {
        text-decoration: underline;
      }

      /* ---------- RIGHT PANEL ---------- */
      .visual-panel {
        flex: 1 1 50%;
        background: var(--panel-bg);
        position: relative;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
        min-width: 0;
      }

      .visual-inner {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
      }

      .visual-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      .safety-card {
        position: absolute;
        bottom: 14px;
        left: 12px;
        right: 12px;
        background: rgba(18, 19, 28, 0.92);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        backdrop-filter: blur(6px);
      }

      .safety-icon {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(135deg, #7c5cff, #5a3fe0);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .safety-icon svg {
        width: 17px;
        height: 17px;
      }

      .safety-text-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 2px;
      }

      .safety-text-body {
        font-size: 11.5px;
        color: var(--text-secondary);
        line-height: 1.4;
      }

      /* ---------- RESPONSIVE ---------- */
      @media (max-width: 820px) {
        html,
        body {
          overflow: auto;
        }
        .auth-card {
          flex-direction: column;
          max-height: none;
          height: auto;
        }
        .visual-panel {
          order: -1;
          min-height: 220px;
          padding: 20px;
        }
        .form-panel {
          padding: 32px 28px;
        }
      }

      /* ===========================
   Background Glass Glow
=========================== */

      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.25;
      }

      body::before {
        background: #3b82f6;
        top: -150px;
        left: -120px;
      }

      body::after {
        background: #6e56ef;
        bottom: -180px;
        right: -120px;
      }

      /* Glass enhancement */

      .auth-card {
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      /* Inputs */

      .input-wrap input {
        transition:
          border-color 0.25s,
          box-shadow 0.25s,
          transform 0.25s,
          background 0.25s;
      }

      .input-wrap:hover input {
        background: #202233;
      }

      .input-wrap input:focus {
        transform: translateY(-2px);
      }

      /* Button */

      .btn-login {
        transition:
          transform 0.3s,
          box-shadow 0.3s,
          filter 0.3s;
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow:
          0 12px 30px rgba(110, 86, 239, 0.35),
          0 0 18px rgba(110, 86, 239, 0.25);
      }

      /* Safety Card */

      .safety-card {
        transition: 0.35s;
      }

      .safety-card:hover {
        transform: translateY(-4px);
        border-color: #4a63ff;
      }

      /* Right image */

      .visual-inner img {
        transition: transform 1s ease;
      }

      .visual-panel:hover img {
        transform: scale(1.04);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <!-- LEFT: FORM -->
      <div class="form-panel">
        <div class="logo-wrap">
          <img src="./assets/logo.png" alt="ResQGrid" />
        </div>
        <p class="tagline">Find. Connect. Reunite.</p>

        <h1 class="welcome-title">Create account!</h1>
        <p class="welcome-sub">Register to join the mission.</p>

        <form id="registerForm" action="/auth/register" method="POST">
          <div class="field-group">
            <div class="field-label">
              <span>Name</span>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input
                type="text"
                name="Name"
                placeholder="Enter your full name"
                required
                autocomplete="name"
              />
            </div>
          </div>

          <div class="field-group">
            <div class="field-label">
              <span>Email</span>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 4h16v16H4z" opacity="0" />
                <path d="M22 6l-10 7L2 6" />
                <path d="M2 6h20v12H2z" />
              </svg>
              <input
                type="email"
                name="Email"
                placeholder="Enter email"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="field-group">
            <div class="field-label">
              <span>Password</span>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="11" width="14" height="9" rx="2" />
                <path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
              <input
                type="password"
                id="password"
                name="Password"
                placeholder="Enter password"
                required
                autocomplete="new-password"
              />
              <button
                type="button"
                class="toggle-eye"
                id="togglePassword"
                aria-label="Show password"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  id="eyeIcon"
                >
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="field-group">
            <div class="field-label">
              <span>Contact Number</span>
            </div>
            <div class="input-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
                />
              </svg>
              <input
                type="number"
                name="ContactNumber"
                placeholder="Enter contact number"
                required
                autocomplete="tel"
              />
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms"
              >I agree to the <a href="/terms">Terms</a> &amp;
              <a href="/privacy">Privacy Policy</a></label
            >
          </div>
          <input
            type="text"
            id="inputrole"
            name="Role"
            style="visibility: hidden"
          />

          <button type="submit" class="btn-login">Register</button>
        </form>

        <p class="register-text">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>

      <!-- RIGHT: VISUAL -->
      <div class="visual-panel">
        <div class="visual-inner">
          <img
            src="./assets/map-illustration.png"
            alt="Rescue location map illustration"
          />
          <div class="safety-card">
            <div class="safety-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2 4 5v6c0 5 3.4 9 8 11 4.6-2 8-6 8-11V5z" />
                <path d="M9 12l2 2 4-4" stroke="#f7931e" />
              </svg>
            </div>
            <div>
              <div class="safety-text-title">Your data is safe with us.</div>
              <div class="safety-text-body">
                We protect your privacy and ensure secure connections.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // ==========================
        // Password Toggle
        // ==========================
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        togglePassword.addEventListener("click", () => {
          const hidden = passwordInput.type === "password";

          passwordInput.type = hidden ? "text" : "password";

          eyeIcon.innerHTML = hidden
            ? `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a21.7 21.7 0 0 1-3.16 4.53M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>`;

          togglePassword.setAttribute(
            "aria-label",
            hidden ? "Hide password" : "Show password",
          );
        });

        // ==========================
        // Role Handling
        // ==========================
        const params = new URLSearchParams(window.location.search);
        let role = params.get("role");

        if (role) {
          role = role.toLowerCase();
          localStorage.setItem("role", role);
        } else {
          role = localStorage.getItem("role");
        }

        if (!role) {
          role = "guardian";
          localStorage.setItem("role", role);
        }

        // Set hidden input value
        document.getElementById("inputrole").value = role;

        console.log("Selected Role:", role);
        console.log(
          "Hidden Input:",
          document.getElementById("inputrole").value,
        );
        console.log("LocalStorage:", localStorage.getItem("role"));
      });

      // ============================
      // GSAP Animations
      // ============================

      window.addEventListener("load", () => {
        const tl = gsap.timeline({
          defaults: {
            ease: "power3.out",
          },
        });

        // Card

        tl.from(".auth-card", {
          opacity: 0,
          y: 35,
          duration: 0.8,
        });

        // Left content

        tl.from(
          [".logo-wrap", ".tagline", ".welcome-title", ".welcome-sub"],
          {
            opacity: 0,
            y: 18,
            stagger: 0.08,
            duration: 0.45,
          },
          "-=0.45",
        );

        // Fields

        tl.from(
          ".field-group",
          {
            opacity: 0,
            y: 18,
            stagger: 0.08,
            duration: 0.4,
          },
          "-=0.3",
        );

        tl.from(
          ".remember-row",
          {
            opacity: 0,
            y: 15,
            duration: 0.35,
          },
          "-=0.1",
        );

        tl.from(
          ".btn-login",
          {
            opacity: 0,
            scale: 0.94,
            duration: 0.45,
          },
          "-=0.15",
        );

        tl.from(".register-text", {
          opacity: 0,
          y: 12,
          duration: 0.35,
        });

        // Right panel

        tl.from(
          ".visual-panel",
          {
            opacity: 0,
            x: 40,
            duration: 0.8,
          },
          "-=1",
        );

        tl.from(
          ".safety-card",
          {
            opacity: 0,
            y: 30,
            duration: 0.5,
          },
          "-=0.3",
        );

        // Floating blobs

        gsap.to("body::before", {}); // keeps parser happy

        // Floating image

        gsap.to(".visual-inner img", {
          y: -10,
          duration: 4,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });

        // Safety card breathing

        gsap.to(".safety-card", {
          y: -5,
          duration: 2.8,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
      });

      // ============================
      // Input Hover Animation
      // ============================

      document.querySelectorAll(".input-wrap input").forEach((input) => {
        input.addEventListener("mouseenter", () => {
          gsap.to(input, {
            y: -2,
            duration: 0.2,
          });
        });

        input.addEventListener("mouseleave", () => {
          if (document.activeElement !== input) {
            gsap.to(input, {
              y: 0,
              duration: 0.2,
            });
          }
        });
      });

      // ============================
      // Button Hover
      // ============================

      const btn = document.querySelector(".btn-login");

      btn.addEventListener("mouseenter", () => {
        gsap.to(btn, {
          scale: 1.02,
          duration: 0.2,
        });
      });

      btn.addEventListener("mouseleave", () => {
        gsap.to(btn, {
          scale: 1,
          duration: 0.2,
        });
      });
    </script>
  </body>
</html>
