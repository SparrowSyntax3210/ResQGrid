<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing creation</title>
</head>
<body>
    <div class="listing-">
        <h1>Create Listing</h1>
        <form action="/listing" method="POST">
            <input type="image" name="Image" id="" placeholder="Upload Image" multiple>
            <input type="text" name="Name" id="" placeholder="Enter Name">
            <input type="textarea" name="Physical" id="" placeholder="Enter you Physical Characteristics">
            <input type="text" name="Location" id="" placeholder="Enter you Location">
            <input type="number" name="Contact" id="" placeholder="Enter your number">
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
