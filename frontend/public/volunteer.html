<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard</title>
</head>
<body>

    <h1>Volunteer</h1>

    <button id="show-active">Show Active Cases</button>

    <div id="cases"></div>

    <script>

        const container = document.getElementById("cases");

        document.getElementById("show-active").addEventListener("click", async () => {

            try {

                const res = await fetch("http://localhost:5000/guardian/application");

                const data = await res.json();

                container.innerHTML = "";

                if (!data.length) {
                    container.innerHTML = "<h3>No active cases found.</h3>";
                    return;
                }

                data.forEach(app => {

                    container.innerHTML += `
                        <div class="case" style="border:1px solid #000;padding:15px;margin:15px;">

                            <h2>${app.Name}</h2>

                            <p>Age: ${app.Age}</p>

                            <p>Last Seen: ${app.LastSeen}</p>

                            <button
                                class="accept-btn"
                                data-id="${app._id}"
                                data-location="${app.LastSeen}">
                                Accept
                            </button>

                        </div>
                    `;

                });

            } catch (err) {

                console.error(err);

            }

        });

        document.addEventListener("click", (e) => {

            if (!e.target.classList.contains("accept-btn")) return;

            const caseId = e.target.dataset.id;
            const location = e.target.dataset.location;

            window.location.href =
                `map.html?id=${caseId}&location=${encodeURIComponent(location)}`;

        });

    </script>

</body>
</html>
