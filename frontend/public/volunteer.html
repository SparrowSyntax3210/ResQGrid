<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Volunteer</h1>
    <button id="show-active">Show Active Cases</button>
    <div id="cases"></div>

    <script>
        const container = document.getElementById("cases");

document.getElementById("show-active").addEventListener("click", async () => {
    const res = await fetch("http://localhost:5000/guardian/application");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(app => {
        container.innerHTML += `
            <h2>${app.Name}</h2>
            <p>Age: ${app.Age}</p>
            <p>Last Seen: ${app.LastSeen}</p>
        `;
    });
});
    </script>
</body>

</html>
